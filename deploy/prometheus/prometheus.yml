global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    system: sovereign_trading

scrape_configs:
  - job_name: sovereign_trading
    static_configs:
      - targets: ["trading:9090"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: questdb
    static_configs:
      - targets: ["questdb:9000"]
    metrics_path: /metrics
    scrape_interval: 30s
