repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of file
      - id: check-yaml
        name: Check YAML
      - id: check-json
        name: Check JSON
      - id: check-toml
        name: Check TOML
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: detect-private-key
        name: Detect private keys
      - id: mixed-line-ending
        name: Check line endings
        args: ['--fix=lf']

  - repo: https://github.com/psf/black
    rev: 23.3.0
    hooks:
      - id: black
        name: Format with Black
        language_version: python3.11
        args: ['--line-length=100']

  - repo: https://github.com/PyCQA/flake8
    rev: 6.0.0
    hooks:
      - id: flake8
        name: Lint with Flake8
        args:
          - --max-line-length=100
          - --extend-ignore=E203,W503
          - --count
          - --statistics

  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
      - id: isort
        name: Sort imports with isort
        args: ['--profile=black']

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.2.0
    hooks:
      - id: mypy
        name: Type check with MyPy
        additional_dependencies: ['types-all']
        args: ['--ignore-missing-imports']

  - repo: https://github.com/asottile/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        name: Security check with Bandit
        args: ['-c', '.bandit']
        exclude: '^tests/'

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.4.1
    hooks:
      - id: pyupgrade
        name: Upgrade Python syntax
        args: ['--py39-plus']

  - repo: https://github.com/asottile/reorder_python_imports
    rev: v3.9.0
    hooks:
      - id: reorder-python-imports
        name: Reorder Python imports
        args: ['--py39-plus', '--add-import', 'from __future__ import annotations']

  - repo: https://github.com/hadialqattan/pycln
    rev: v2.2.1
    hooks:
      - id: pycln
        name: Remove unused imports with pycln
        args: ['--all']

  - repo: https://github.com/codespell-project/codespell
    rev: v2.2.4
    hooks:
      - id: codespell
        name: Check spelling
        args: ['--ignore-words-list=crate,nd,sav,ser,wil']

  - repo: local
    hooks:
      - id: pytest-check
        name: pytest (local)
        entry: pytest
        language: system
        types: [python]
        stages: [commit]
        pass_filenames: false
        always_run: true
        args: ['tests/', '-q']

      - id: sort-requirements
        name: Sort requirements files
        entry: bash -c 'sort requirements.txt > /tmp/requirements.txt && mv /tmp/requirements.txt requirements.txt'
        language: system
        files: ^requirements\.txt$

ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: [pytest-check]
  submodules: false