name: Samvid CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Python: lint + test + coverage (fast, no Rust/Node dependency)
  # ──────────────────────────────────────────────────────────────────────────
  python:
    name: Python lint & test
    runs-on: ubuntu-latest
    env:
      UV_SYSTEM_PYTHON: 1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --locked

      - name: Ruff lint
        run: uv run ruff check src/ tests/ scripts/ --output-format=github

      - name: Run tests
        id: pytest
        env:
          SESSION_SECRET: "TEST_SESSION_SECRET_UNSECURE_MOCK_FOR_TESTS_ONLY"
          MT5_LOGIN: "999999"
          MT5_PASSWORD: "test_password"
          MT5_SERVER: "MetaQuotes-Demo"
          MT5_PATH: "/mock/path/to/terminal64.exe"
          TELEGRAM_BOT_TOKEN: "123456789:ABCdefGhIJKlmNoPQRsTUVwxyZ"
          TELEGRAM_CHAT_ID: "987654321"
        run: |
          uv run python -m pytest tests/ -q --tb=short \
            --cov=src --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=25 \
            --junitxml=test-results.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

      - name: Compile check
        run: uv run python -m compileall -q src/ tests/ scripts/

      - name: Check import cycles
        run: uv run python scripts/detect_cycles.py

  # ──────────────────────────────────────────────────────────────────────────
  # Full stack: Rust + Node frontend (only on main branch pushes)
  # ──────────────────────────────────────────────────────────────────────────
  full-stack:
    name: Full stack build
    runs-on: ubuntu-latest
    needs: python
    if: github.ref == 'refs/heads/main'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      UV_SYSTEM_PYTHON: 1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --locked

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test Rust
        run: cargo test

      - name: Build native library
        run: make

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend
