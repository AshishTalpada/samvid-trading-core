name: Samvid CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      UV_SYSTEM_PYTHON: 1
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --locked

      - name: Lint Python
        run: uv run ruff check src tests scripts tools

      - name: Test Python
        env:
          SESSION_SECRET: "TEST_SESSION_SECRET_UNSECURE_MOCK_FOR_TESTS_ONLY"
          MT5_LOGIN: "999999"
          MT5_PASSWORD: "test_password"
          MT5_SERVER: "MetaQuotes-Demo"
          MT5_PATH: "/mock/path/to/terminal64.exe"
          TELEGRAM_BOT_TOKEN: "123456789:ABCdefGhIJKlmNoPQRsTUVwxyZ"
          TELEGRAM_CHAT_ID: "987654321"
        run: uv run python -m pytest tests -q

      - name: Compile Python
        run: uv run python -m compileall -q src tests scripts tools

      - name: Check Python import cycles
        run: uv run python scripts/detect_cycles.py

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test Rust
        run: cargo test

      - name: Build native library
        run: make

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend
