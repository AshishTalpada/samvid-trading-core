name: Samvid CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest
          # Install project in editable mode to handle imports correctly
          pip install -e .

      - name: Lint with Ruff
        run: ruff check src tests 

      - name: Type check with Mypy
        run: mypy

      - name: Run Tests
        run: pytest
